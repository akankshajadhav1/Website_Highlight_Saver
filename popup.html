<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Website Highlight Saver</title>
  <link rel="stylesheet" href="popup.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <h1>My Highlights</h1>
    <div class="actions">
      <button id="settings-btn" title="Settings">⚙️</button>
    </div>
  </header>
  
  <main>
    <div id="highlights-container">
      <!-- Highlights will be injected here -->
      <div id="empty-state" class="hidden">
        <p>No highlights saved yet.</p>
        <p class="subtext">Select text on any webpage to save it.</p>
      </div>
    </div>
  </main>

  <!-- Modal for API Key Settings -->
  <div id="settings-modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Settings</h2>
        <button id="close-settings" class="close-btn">&times;</button>
      </div>
      <div class="modal-body">
        <label for="api-key">OpenAI API Key (Optional, for summarizing)</label>
        <input type="password" id="api-key" placeholder="sk-...">
        <p class="help-text">Your key is stored securely in local browser storage.</p>
        <button id="save-api-key" class="primary-btn">Save</button>
        <p id="settings-status" class="status-msg"></p>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
